name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
permissions:
  contents: write
jobs:
  qodana-jvm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # to check out the actual pull request commit, not the merge commit
          fetch-depth: 0  # a full history is required for pull request analysis
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_JVM }} # read the steps about it below
        with:
          pr-mode: false
          args: --log-level,debug

  qodana-js:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # to check out the actual pull request commit, not the merge commit
          fetch-depth: 0  # a full history is required for pull request analysis
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1
        with:
          args: -i,vscode/qodana
          pr-mode: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_JS }} # read the steps about it below

  build:
    strategy:
      matrix:
        os: [ macos-latest, ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
        submodules: true
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Setup JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'adopt'
        cache: gradle
    - name: Run Java tests
      run: ./gradlew test
    - name: Build Fat jar
      run: ./gradlew shadowJar
    - name: Setup Node
      uses: actions/setup-node@v2
      with:
        node-version: '20.18'
    - name: Install dependencies
      run: npm install -g vsce ovsx && npm ci
      working-directory: vscode/qodana
    - name: Run ts tests
      run: xvfb-run -a npm run test
      working-directory: vscode/qodana
      if: matrix.os == 'ubuntu-latest'
    - name: Run ts tests
      run: npm run test
      working-directory: vscode/qodana
      if: runner.os != 'Linux'
    - name: Prepare release from tag
      if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
      run: |
        # Extract version from tag (remove 'v' prefix)
        TAG=${GITHUB_REF##*/}
        VERSION=${TAG#v}

        echo "Preparing release for version $VERSION from tag $TAG"

        # Run release preparation script
        node scripts/prepare-release.js $VERSION

        # Check if there are changes to commit
        if ! git diff --quiet; then
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "chore: prepare release $VERSION"
          git push
        else
          echo "No changes to commit"
        fi
    - name: Package
      run: npm run package
      working-directory: vscode/qodana
    - name: Save artifact
      uses: actions/upload-artifact@v4
      if: matrix.os == 'ubuntu-latest'
      with:
        name: qodana
        path: vscode/qodana/*.vsix
    - name: Generate release notes
      if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
      id: release_notes
      run: |
        TAG=${GITHUB_REF##*/}
        PREV_TAG=$(git describe --tags --abbrev=0 ${TAG}^ 2>/dev/null || echo "")

        if [ -z "$PREV_TAG" ]; then
          RANGE="HEAD"
        else
          RANGE="${PREV_TAG}..${TAG}"
        fi

        echo "Generating release notes from ${RANGE}..."

        # Generate changelog from conventional commits
        NOTES=""
        ADDED=""
        CHANGED=""
        FIXED=""

        while IFS= read -r commit; do
          if [[ $commit =~ ^feat[:(] ]]; then
            DESC=$(echo "$commit" | sed -E 's/^feat(\([^)]+\))?: //')
            ADDED="${ADDED}- ${DESC}\n"
          elif [[ $commit =~ ^fix[:(] ]]; then
            DESC=$(echo "$commit" | sed -E 's/^fix(\([^)]+\))?: //')
            FIXED="${FIXED}- ${DESC}\n"
          elif [[ $commit =~ ^(chore|refactor|perf|docs)[:(] ]]; then
            DESC=$(echo "$commit" | sed -E 's/^[a-z]+(\([^)]+\))?: //')
            CHANGED="${CHANGED}- ${DESC}\n"
          fi
        done < <(git log ${RANGE} --pretty=format:"%s")

        if [ -n "$ADDED" ]; then
          NOTES="${NOTES}### Added\n\n${ADDED}\n"
        fi
        if [ -n "$CHANGED" ]; then
          NOTES="${NOTES}### Changed\n\n${CHANGED}\n"
        fi
        if [ -n "$FIXED" ]; then
          NOTES="${NOTES}### Fixed\n\n${FIXED}\n"
        fi

        if [ -z "$NOTES" ]; then
          NOTES="Release ${TAG}"
        fi

        echo "$NOTES" > release_notes.md
        cat release_notes.md
    - name: Publish
      if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
      run: |
        gh release create ${GITHUB_REF##*/} --notes-file release_notes.md
        vsce publish -p ${{ secrets.VSCE_PAT }} -i qodana-cloud-plugin.vsix
        ovsx publish qodana-cloud-plugin.vsix -p ${{ secrets.OVSX_PAT }}
      working-directory: vscode/qodana
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OVSX_PAT: ${{ secrets.OVSX_PAT }}